name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  vmess-config-generator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Create mock config
        run: |
          cat > config.json <<'EOF'
          {
            "uuid": "00000000-0000-0000-0000-000000000000",
            "ws_path": "/test",
            "domain": "example.com"
          }
          EOF

      - name: Validate generated configs
        run: |
          output=$(python vmess.py)
          # Check output is non-empty
          if [ -z "$output" ]; then
            echo "ERROR: vmess.py produced no output"
            exit 1
          fi
          # Check output is valid base64 that decodes to vmess:// links
          decoded=$(echo "$output" | base64 -d)
          count=$(echo "$decoded" | grep -c '^vmess://')
          ip_count=$(grep -c . cloudflare_ips.txt)
          echo "Generated $count configs for $ip_count IP ranges"
          if [ "$count" -ne "$ip_count" ]; then
            echo "ERROR: expected $ip_count configs, got $count"
            exit 1
          fi
          echo "All checks passed"
